name: Deploy to GCP

on:
  push:
    branches: [main]

env:
  PROJECT: the-mind-financial-reports
  REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev/the-mind-financial-reports/apps

jobs:
  # Which images need a rebuild (shared = pyproject / lock / Dockerfile → both).
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      deploy_server: ${{ steps.flags.outputs.deploy_server }}
      deploy_job: ${{ steps.flags.outputs.deploy_job }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'report_server/**'
            job:
              - 'src/**'
            shared:
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Dockerfile'

      - name: Set deploy flags
        id: flags
        env:
          CH_SERVER: ${{ steps.filter.outputs.server }}
          CH_JOB: ${{ steps.filter.outputs.job }}
          CH_SHARED: ${{ steps.filter.outputs.shared }}
        run: |
          deploy_server=false
          deploy_job=false
          if [[ "$CH_SERVER" == "true" || "$CH_SHARED" == "true" ]]; then deploy_server=true; fi
          if [[ "$CH_JOB" == "true" || "$CH_SHARED" == "true" ]]; then deploy_job=true; fi
          echo "deploy_server=$deploy_server" >> "$GITHUB_OUTPUT"
          echo "deploy_job=$deploy_job" >> "$GITHUB_OUTPUT"
          echo "→ deploy report-server: $deploy_server"
          echo "→ deploy report-job:    $deploy_job"

  deploy-server:
    name: Cloud Run — report-server
    needs: changes
    if: needs.changes.outputs.deploy_server == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push report-server image
        run: |
          IMAGE="${{ env.REGISTRY }}/report-server:latest"
          docker build --target report-server -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Prune untagged report-server images
        run: |
          gcloud artifacts docker images list ${{ env.REGISTRY }}/report-server \
            --filter="tags=''" --format="get(version)" --quiet 2>/dev/null \
            | xargs -r -I{} gcloud artifacts docker images delete \
              "${{ env.REGISTRY }}/report-server@{}" --quiet --async 2>/dev/null || true

      - name: Deploy Cloud Run service (report-server)
        run: |
          gcloud run deploy report-server \
            --image="${{ env.REGISTRY }}/report-server:latest" \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=1 \
            --cpu=1 \
            --memory=512Mi \
            --service-account=report-job-sa@${{ env.PROJECT }}.iam.gserviceaccount.com \
            --project=${{ env.PROJECT }} \
            --quiet

  deploy-job:
    name: Cloud Run Job — report-job
    needs: changes
    if: needs.changes.outputs.deploy_job == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push report-job image
        run: |
          IMAGE="${{ env.REGISTRY }}/report-job:latest"
          docker build --target job -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Prune untagged report-job images
        run: |
          gcloud artifacts docker images list ${{ env.REGISTRY }}/report-job \
            --filter="tags=''" --format="get(version)" --quiet 2>/dev/null \
            | xargs -r -I{} gcloud artifacts docker images delete \
              "${{ env.REGISTRY }}/report-job@{}" --quiet --async 2>/dev/null || true

      - name: Update Cloud Run job (report-job)
        run: |
          gcloud run jobs update report-job \
            --image="${{ env.REGISTRY }}/report-job:latest" \
            --service-account=report-job-sa@${{ env.PROJECT }}.iam.gserviceaccount.com \
            --region=${{ env.REGION }} \
            --memory=2Gi \
            --cpu=2 \
            --max-retries=0 \
            --task-timeout=60m \
            --set-secrets="GEMINI_API_KEY=GEMINI_API_KEY:latest,GEMINI_API_KEY_FREE=GEMINI_API_KEY_FREE:latest,SCRAPEDO_API_KEY=SCRAPEDO_API_KEY:latest,FRED_API_KEY=FRED_API_KEY:latest" \
            --project=${{ env.PROJECT }} \
            --quiet
